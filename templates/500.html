{% extends "base.html" %}

{% block title %}Ошибка сервера{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-container">
        <div class="error-code">500</div>
        <h1>Что-то пошло не так</h1>
        <p>На сервере произошла ошибка. Мы уже работаем над её устранением.</p>
        <p>Попробуйте вернуться на главную или повторить попытку позже.</p>
        <a href="{{ url_for('index') }}" class="error-btn">На главную</a>
    </div>
</div>
{% endblock %}
